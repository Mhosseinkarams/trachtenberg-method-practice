name: Jules Bot (Google Jules)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@jules')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@jules'))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # to push commits / create branches
      pull-requests: write     # to create PRs and comment
      issues: write            # to comment on issues
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai PyGithub

      - name: Run Jules bot (Google Jules API)
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL_NAME: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python .github/scripts/jules_bot.py
