name: Jules Interactive

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  jules-interactive:
    if: contains(github.event.comment.body, '@jules')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Extract Prompt and Branch
        id: context
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract prompt
          PROMPT=$(python3 -c "import os, re; body = os.environ['COMMENT_BODY']; match = re.search(r'@jules\s+(.*)', body, re.DOTALL | re.IGNORECASE); print(match.group(1).strip() if match else '')")
          echo "prompt<<JULES_PROMPT_EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "JULES_PROMPT_EOF" >> $GITHUB_OUTPUT

          # Determine branch
          if [ "${{ github.event_name }}" == "pull_request_review_comment" ]; then
            echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.issue.pull_request.url }}" ]; then
            BRANCH=$(curl -s -H "Authorization: token $GITHUB_TOKEN" ${{ github.event.issue.pull_request.url }} | jq -r .head.ref)
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

      - name: Invoke Jules
        uses: google-labs-code/jules-action@main
        with:
          prompt: ${{ steps.context.outputs.prompt }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ steps.context.outputs.branch }}
