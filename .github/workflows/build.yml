name: Build Fast Math Trainer

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - web
          - android
          - windows
          - all

env:
  PYTHONUTF8: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    if: github.event.inputs.platform == 'web' || github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flet
      - name: Build Web
        run: |
          flet build web app/ --output build/web --yes
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-android:
    if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flet
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Android APK
        run: |
          flet build apk app/ --output build/apk --yes
      - name: List Build Directory
        run: |
          if (Test-Path build) { ls -R build } else { echo "Build directory not found" }
        shell: pwsh
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/apk/*.apk

  build-windows:
    if: github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flet
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build Windows
        run: |
          flet build windows app/ --output build/windows --yes
      - name: List Build Directory
        run: |
          if (Test-Path build) { ls -R build } else { echo "Build directory not found" }
        shell: pwsh
      - name: Upload Windows Distribution
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows
